name: Daily Stock Analysis

on:
  # Scheduled trigger: every weekday at 18:00 Beijing time (10:00 UTC)
  schedule:
    - cron: '0 10 * * 1-5'     # Monday-Friday, 10:00 UTC = 18:00 Beijing time
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # Full analysis (stocks + market review)
          - market-only   # Market review only
          - stocks-only   # Stock analysis only
      force_run:
        description: 'Force run (skip trading-day check)'
        required: false
        default: false
        type: boolean

# Concurrency control: allow only one analysis run at a time
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Add a timeout guard to avoid hung jobs
    timeout-minutes: 30
    
    steps:
      - name: Random startup delay
        run: sleep $((RANDOM % 60))  # Delay startup by 0-60 seconds
      
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create required directories
        run: |
          mkdir -p data logs reports
      
      - name: Run stock analysis
        env:
          # ==========================================
          # AI configuration
          # ==========================================
          # LiteLLM config
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}

          # Gemini AI (primary)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          # AIHubMix (preferred over OPENAI_API_KEY, auto-adapts base_url)
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI-compatible API (fallback)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # DeepSeek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          
          # Anthropic / Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ==========================================
          # Data sources
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          # Longbridge OpenAPI (adds realtime fields for US/HK stocks; if unset, only YFinance/AkShare is used)
          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          LONGBRIDGE_REGION: ${{ vars.LONGBRIDGE_REGION || secrets.LONGBRIDGE_REGION }}
          LONGBRIDGE_HTTP_URL: ${{ vars.LONGBRIDGE_HTTP_URL || secrets.LONGBRIDGE_HTTP_URL }}
          LONGBRIDGE_QUOTE_WS_URL: ${{ vars.LONGBRIDGE_QUOTE_WS_URL || secrets.LONGBRIDGE_QUOTE_WS_URL }}
          LONGBRIDGE_TRADE_WS_URL: ${{ vars.LONGBRIDGE_TRADE_WS_URL || secrets.LONGBRIDGE_TRADE_WS_URL }}
          LONGBRIDGE_STATIC_INFO_TTL_SECONDS: ${{ vars.LONGBRIDGE_STATIC_INFO_TTL_SECONDS || secrets.LONGBRIDGE_STATIC_INFO_TTL_SECONDS }}
          LONGBRIDGE_ENABLE_OVERNIGHT: ${{ vars.LONGBRIDGE_ENABLE_OVERNIGHT || secrets.LONGBRIDGE_ENABLE_OVERNIGHT }}
          LONGBRIDGE_PUSH_CANDLESTICK_MODE: ${{ vars.LONGBRIDGE_PUSH_CANDLESTICK_MODE || secrets.LONGBRIDGE_PUSH_CANDLESTICK_MODE }}
          LONGBRIDGE_PRINT_QUOTE_PACKAGES: ${{ vars.LONGBRIDGE_PRINT_QUOTE_PACKAGES || secrets.LONGBRIDGE_PRINT_QUOTE_PACKAGES }}
          
          # ==========================================
          # Search services
          # ==========================================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ secrets.SEARXNG_BASE_URLS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED }}
          
          # ==========================================
          # Notification channels (multiple channels can be enabled together)
          # ==========================================
          
          # Option 1: WeCom webhook
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          
          # Option 2: Feishu webhook
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # Option 3: Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          
          # Option 4: Email
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis Stock Analysis Assistant' }}
          
          # Option 5: Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          
          # Option 6: PushPlus
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          # Option 7: Custom webhooks (DingTalk, Bark, self-hosted services, etc.)
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          
          # Option 8: Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          # Option 9: Feishu Docs
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}

          # Option 10: AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # Option 11: ServerChan 3
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # Option 12: Slack
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

          # ==========================================
          # Watchlist configuration
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          
          # ==========================================
          # Runtime configuration
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'zh' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          # ==========================================
          # System configuration
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          # Chip distribution: default false because the cloud API is unstable; enable via Settings -> Variables
          ENABLE_CHIP_DISTRIBUTION: ${{ vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}
          # Realtime quote source priority
          # Allowed values: tencent, akshare_sina, efinance, akshare_em, tushare
          # If you have a high-tier Tushare Pro account, you can move tushare to the front
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          
        run: |
          # Materialize the LiteLLM YAML config file when provided via Secrets/Variables
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            echo "📝 Using LITELLM_CONFIG_YAML from GitHub Actions Secrets/Variables"
            # Ensure the target directory exists
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            # Write the config file and overwrite any existing file
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
            echo "✅ LiteLLM config file written: $LITELLM_CONFIG"
          fi

          # Resolve run mode
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          echo "=========================================="
          echo "🚀 AI Stock Analysis System"
          echo "=========================================="
          echo "⏰ Time: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 Run mode: $MODE"
          echo "📊 Watchlist: $STOCK_LIST"
          echo "📝 Report type: $REPORT_TYPE"
          echo "🌐 Report language: $REPORT_LANGUAGE"
          echo ""
          echo "=========================================="
          echo "📋 Configuration check"
          echo "=========================================="
          echo "[AI configuration]"
          echo "  LiteLLM: $([ -n "$LITELLM_CONFIG" ] || [ -n "$LITELLM_API_KEY" ] || [ -n "$LITELLM_MODEL" ] && echo '✅ Configured' || echo '❌ Not configured')"
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ Configured' || echo '❌ Not configured')"
          echo "  DeepSeek Key:   $([ -n "$DEEPSEEK_API_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo ""
          echo "[Data sources]"
          echo "  Tushare Token: $([ -n "$TUSHARE_TOKEN" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Longbridge: $([ -n "$LONGBRIDGE_APP_KEY" ] && [ -n "$LONGBRIDGE_APP_SECRET" ] && [ -n "$LONGBRIDGE_ACCESS_TOKEN" ] && echo '✅ Configured (adds US/HK market data)' || echo '⚪ Not configured (YFinance/AkShare only, no Longbridge calls)')"
          echo ""
          echo "[Search engines]"
          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  SerpAPI Keys: $([ -n "$SERPAPI_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  MiniMax API Keys: $([ -n "$MINIMAX_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Brave API Keys: $([ -n "$BRAVE_API_KEYS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  SearXNG Base URLs: $([ -n "$SEARXNG_BASE_URLS" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          case "${SEARXNG_PUBLIC_INSTANCES_ENABLED,,}" in
            0|false|no|off)
              echo "  SearXNG Public Instances: ❌ Disabled"
              ;;
            "")
              echo "  SearXNG Public Instances: ✅ Enabled by default"
              ;;
            *)
              echo "  SearXNG Public Instances: ✅ Enabled"
              ;;
          esac
          echo ""
          echo "[Notification channels]"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  WeCom: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Feishu: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "  Slack: $(([ -n "$SLACK_WEBHOOK_URL" ] || ([ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ])) && echo '✅ Configured' || echo '⚪ Not configured')"
          echo "=========================================="
          echo ""
          
          # Build CLI arguments
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ Force-run mode enabled (skipping trading-day check)"
          fi

          # Run analysis
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: Upload analysis reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: Show run result
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Analysis completed"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Generated reports:"
            ls -la reports/
          else
            echo "⚠️ No report files were generated"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 Recent logs (last 30 lines):"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "No logs"
          fi
