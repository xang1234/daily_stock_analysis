# ===================================
# AI Stock Analysis System - Docker Compose
# ===================================
# 
# Usage:
#   Scheduled mode: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI mode: docker-compose -f ./docker/docker-compose.yml up -d server
#   Start both: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # Environment variables loaded from .env
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../.env:/app/.env
    - ../strategies:/app/strategies:ro
    # To override frontend static assets, mount a local static directory
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT is loaded from .env and does not need to be hard-coded here

    # Proxy settings if needed
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # Resource limits
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # Scheduled mode
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI mode
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # If network_mode: host is used, the port mapping below is ignored and --port in command takes effect
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
